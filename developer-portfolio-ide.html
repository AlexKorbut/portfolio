<style>
:root{
  --bg:#1e1e2e;
  --panel:#252537;
  --sidebar:#181825;
  --bar:#181825;
  --tabbar:#21212f;
  --border:rgba(255,255,255,.07);
  --border-strong:rgba(255,255,255,.12);
  --text:#cdd6f4;
  --muted:#6a737d;
  --gutter:#5b5b72;
  --kw:#c678dd;
  --kw2:#ff79c6;
  --str:#98c379;
  --str2:#50fa7b;
  --fn:#61afef;
  --num:#d19a66;
  --com:#6a737d;
  --acc:#56b6c2;
  --acc-dim:rgba(86,182,194,.13);
  --tag:#e06c75;
  --statusbar:#56b6c2;
  --mono:'SFMono-Regular','JetBrains Mono','Cascadia Code','Fira Code','Consolas','Menlo','Liberation Mono',monospace;
  --tabh:38px;
  --statush:24px;
  --activw:48px;
  --explw:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  height:100vh;
}
.skip-link{
  position:absolute;left:-9999px;top:0;z-index:300;
  background:var(--acc);color:#11111b;padding:8px 16px;
  font-weight:600;text-decoration:none;border-radius:0 0 6px 0;
}
.skip-link:focus{left:0}

/* WINDOW SHELL */
.ide{
  display:grid;
  grid-template-columns:var(--activw) var(--explw) 1fr;
  grid-template-rows:1fr var(--statush);
  height:100vh;
}

/* ACTIVITY BAR */
.activity-bar{
  grid-row:1/2;grid-column:1/2;
  background:var(--bar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding-top:10px;gap:4px;
}
.activity-bar button{
  width:40px;height:40px;background:none;border:none;
  color:var(--muted);cursor:pointer;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative;transition:color .15s,background .15s;
}
.activity-bar button:hover{color:var(--text)}
.activity-bar button.active{color:var(--text)}
.activity-bar button.active::before{
  content:'';position:absolute;left:-6px;top:8px;bottom:8px;width:2px;
  background:var(--acc);border-radius:2px;
}
.activity-bar svg{width:22px;height:22px;fill:currentColor}
.activity-spacer{flex:1}

/* EXPLORER */
.explorer{
  grid-row:1/2;grid-column:2/3;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:6px 0;
}
.explorer-title{
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);padding:8px 16px 4px;
}
.tree-folder{
  display:flex;align-items:center;gap:6px;
  padding:3px 12px;color:var(--text);font-size:13px;cursor:default;user-select:none;
}
.tree-folder .arrow{color:var(--muted);font-size:10px;width:10px}
.tree-folder .ico{color:var(--acc)}
.tree-file{
  display:flex;align-items:center;gap:8px;
  width:100%;text-align:left;background:none;border:none;cursor:pointer;
  padding:3px 12px 3px 32px;color:var(--text);font-size:13px;font-family:var(--mono);
  transition:background .12s;border-left:2px solid transparent;
}
.tree-file:hover{background:rgba(255,255,255,.04)}
.tree-file.active{background:rgba(86,182,194,.1);border-left-color:var(--acc)}
.tree-file .fico{font-size:11px;width:14px;text-align:center}
.fico-md{color:var(--fn)}
.fico-json{color:var(--num)}
.fico-ts{color:#3178c6}
.fico-log{color:var(--str)}
.fico-sh{color:var(--kw)}
.tree-indent{padding-left:48px}

/* EDITOR AREA */
.editor{
  grid-row:1/2;grid-column:3/4;
  display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
  min-width:0;
}
.tabbar{
  display:flex;background:var(--tabbar);
  border-bottom:1px solid var(--border);
  height:var(--tabh);overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  scrollbar-width:thin;
}
.tab{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:var(--tabh);background:var(--tabbar);
  border:none;border-right:1px solid var(--border);
  color:var(--muted);font-family:var(--mono);font-size:13px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  border-top:2px solid transparent;transition:color .12s,background .12s;
}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{
  background:var(--bg);color:var(--text);border-top-color:var(--acc);
}
.tab .fico{font-size:11px}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--text);margin-left:2px;opacity:0}
.tab[aria-selected="true"] .dot{opacity:.6}

.breadcrumb{
  display:flex;align-items:center;gap:6px;
  padding:4px 18px;font-size:12px;color:var(--muted);
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;
}
.breadcrumb .sep{opacity:.5}

.editor-scroll{flex:1;overflow-y:auto;overflow-x:auto;position:relative}

.panel{display:none}
.panel.active{display:block}

/* CODE FILE LAYOUT */
.code{
  display:grid;grid-template-columns:auto 1fr;
  font-size:13.5px;line-height:1.7;min-height:100%;
}
.gutter{
  text-align:right;color:var(--gutter);user-select:none;
  padding:14px 14px 40px 18px;background:var(--bg);
  position:sticky;left:0;z-index:1;border-right:1px solid var(--border);
}
.gutter span{display:block}
.codebody{padding:14px 24px 40px 18px;white-space:pre-wrap;word-break:break-word;min-width:0}
.codebody .ln{display:block;min-height:1.7em}
/* syntax */
.kw{color:var(--kw)}
.kw2{color:var(--kw2)}
.str{color:var(--str)}
.fn{color:var(--fn)}
.num{color:var(--num)}
.com{color:var(--com);font-style:italic}
.acc{color:var(--acc)}
.tag{color:var(--tag)}
.punc{color:var(--text);opacity:.7}
.prop{color:#e06c75}
.h1{color:var(--fn);font-weight:700;font-size:1.45em}
.h2{color:var(--kw2);font-weight:700}
.bold{color:var(--text);font-weight:700}
.indent{display:inline-block;width:2ch}
.fold{color:var(--muted);cursor:default;margin-right:6px;font-size:10px;display:inline-block;width:10px}

/* markdown about */
.md-link{color:var(--acc);text-decoration:none;border-bottom:1px dotted var(--acc)}
.md-link:hover{border-bottom-style:solid}
.md-link:focus-visible{outline:2px solid var(--acc);outline-offset:2px}

/* caret */
.caret{
  display:inline-block;width:8px;height:1.05em;background:var(--acc);
  vertical-align:-3px;animation:blink 1.1s steps(1) infinite;margin-left:2px;
}
@keyframes blink{50%{opacity:0}}

/* stats row in about */
.stat-grid{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0 4px}
.stat-box{
  border:1px solid var(--border-strong);border-radius:6px;
  padding:10px 18px;background:var(--panel);min-width:108px;text-align:center;
}
.stat-num{font-size:24px;font-weight:700;color:var(--num)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* contact buttons */
.run-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:2px 0}
.run-btn{
  background:none;border:none;color:inherit;font-family:var(--mono);font-size:13.5px;
  cursor:pointer;text-align:left;padding:0;
}
.run-icon{color:var(--str2);opacity:.8;margin-right:4px}
.clink{color:var(--acc);text-decoration:none}
.clink:hover{text-decoration:underline}
.clink:focus-visible,.run-btn:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:3px}

/* STATUS BAR */
.statusbar{
  grid-row:2/3;grid-column:1/4;
  background:var(--statusbar);color:#11111b;
  display:flex;align-items:center;gap:0;
  height:var(--statush);font-size:12px;padding:0 6px;overflow:hidden;
}
.status-item{display:flex;align-items:center;gap:5px;padding:0 9px;white-space:nowrap}
.status-item.bgdark{background:rgba(0,0,0,.13)}
.status-spacer{flex:1}
.lang-dot{width:9px;height:9px;border-radius:50%;background:#f1e05a;display:inline-block}

/* TOAST */
.toast{
  position:fixed;bottom:40px;right:20px;z-index:200;
  background:var(--panel);border:1px solid var(--acc);color:var(--acc);
  font-family:var(--mono);font-size:13px;padding:10px 16px;border-radius:6px;
  opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:none}

/* scrollbars */
.editor-scroll::-webkit-scrollbar,.explorer::-webkit-scrollbar,.tabbar::-webkit-scrollbar{width:12px;height:10px}
.editor-scroll::-webkit-scrollbar-thumb,.explorer::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:6px}
.editor-scroll::-webkit-scrollbar-track,.explorer::-webkit-scrollbar-track{background:transparent}

::selection{background:var(--acc-dim);color:var(--acc)}

/* MOBILE */
.mobile-bar{display:none}
@media(max-width:768px){
  .ide{grid-template-columns:1fr;grid-template-rows:auto 1fr var(--statush)}
  .activity-bar{display:none}
  .explorer{
    display:none;
    grid-row:2/3;grid-column:1/1;
    position:absolute;top:0;left:0;bottom:var(--statush);width:80%;max-width:280px;z-index:50;
    box-shadow:8px 0 24px rgba(0,0,0,.5);
  }
  .explorer.open{display:block}
  .mobile-bar{
    display:flex;align-items:center;gap:10px;
    grid-row:1/2;grid-column:1/1;
    background:var(--bar);border-bottom:1px solid var(--border);
    padding:6px 10px;height:40px;
  }
  .mobile-bar button{
    background:none;border:none;color:var(--text);font-size:20px;

  .mobile-bar .mtitle{font-size:13px;color:var(--muted)}
  .editor{grid-row:2/3;grid-column:1/1}
  .codebody{padding-right:14px;padding-left:12px;font-size:13px}
  .gutter{padding-left:10px;padding-right:8px}
  .breadcrumb{display:none}
  .statusbar{grid-column:1/1}
  .stat-grid{gap:10px}
  .stat-box{min-width:0;flex:1 1 40%;padding:8px 10px}
}

@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  html{scroll-behavior:auto}
  .caret{animation:none;opacity:1}
}
</style>

/* ═══════════ PANEL BUILDERS (return inner HTML with line-number gutter) ═══════════ */

function codeWrap(lines){
  // lines: array of HTML strings (each is one logical line)
  const gutter = lines.map((_,i)=>`<span>${i+1}</span>`).join("");
  const body = lines.map(l=>`<span class="ln">${l||"&nbsp;"}</span>`).join("");
  return `<div class="code"><div class="gutter" aria-hidden="true">${gutter}</div><div class="codebody">${body}</div></div>`;
}

function buildAbout(){

  L.push(``);
  L.push(`<span class="com">> ${esc(a.tagline)}</span>`);
  L.push(``);
  L.push(`<span class="h2">## Стек</span>`);
  L.push(`<span class="punc">\`</span><span class="str">${a.stack.map(esc).join(" · ")}</span><span class="punc">\`</span>`);
  L.push(``);
  L.push(`<span class="h2">## Кто я такой</span>`);
  L.push(``);
  a.paragraphs.forEach(p=>{ L.push(esc(p)); L.push(``); });
  L.push(`<span class="h2">## Статистика</span>`);
  L.push(`<div class="stat-grid">${DATA.stats.map(s=>`<div class="stat-box"><div class="stat-num" data-count="${esc(s.num)}">0</div><div class="stat-lbl">${esc(s.label)}</div></div>`).join("")}</div>`);
  L.push(``);
  L.push(`<span class="h2">## profile.json</span>`);
  L.push(`<span class="punc">{</span>`);
  const p = DATA.profile;
  L.push(`<span class="indent"></span><span class="prop">"location"</span><span class="punc">:</span> <span class="str">"${esc(p.location)}"</span><span class="punc">,</span>`);
  L.push(`<span class="indent"></span><span class="prop">"languages"</span><span class="punc">:</span> <span class="punc">[</span><span class="str">${p.languages.map(x=>`"${esc(x)}"`).join('</span><span class="punc">, </span><span class="str">')}</span><span class="punc">],</span>`);
  L.push(`<span class="indent"></span><span class="prop">"education"</span><span class="punc">:</span> <span class="punc">[</span>`);
  p.education.forEach((e,i)=>L.push(`<span class="indent"></span><span class="indent"></span><span class="str">"${esc(e)}"</span><span class="punc">${i<p.education.length-1?",":""}</span>`));

  L.push(`<span class="punc">}</span><span class="caret" aria-hidden="true"></span>`);
  return codeWrap(L);
}

const BUILDERS = {
  about: buildAbout, projects: buildProjects, skills: buildSkills,
  experience: buildExperience, learning: buildLearning, contact: buildContact
};

/* ═══════════ RENDER CHROME ═══════════ */
function renderTree(){
  document.getElementById("fileTree").innerHTML = FILES.map(f=>`
    <button class="tree-file" role="tab" data-id="${f.id}" id="tree-${f.id}"
      aria-selected="false" aria-controls="panel-${f.id}" tabindex="-1">
      <span class="fico ${f.ico}">●</span>${f.file}
    </button>`).join("");
}
function renderTabs(){
  document.getElementById("tabbar").innerHTML = FILES.map(f=>`
    <button class="tab" role="tab" data-id="${f.id}" id="tab-${f.id}"
      aria-selected="false" aria-controls="panel-${f.id}" tabindex="-1">
      <span class="fico ${f.ico}">●</span>${f.file}<span class="dot"></span>
    </button>`).join("");
}
function renderPanels(){
  document.getElementById("panels").innerHTML = FILES.map(f=>`
    <section class="panel" id="panel-${f.id}" role="tabpanel"
      aria-labelledby="tab-${f.id}" tabindex="0">${BUILDERS[f.id]()}</section>`).join("");
}

/* ═══════════ TAB SWITCHING ═══════════ */
const langDotColors = { md:"#083fa1", json:"#cbcb41", ts:"#3178c6", log:"#89e051", sh:"#89e051" };

function activate(id, focusTab){
  const meta = FILES.find(f=>f.id===id) || FILES[0];
  FILES.forEach(f=>{
    const on = f.id===id;
    const tab = document.getElementById("tab-"+f.id);
    const tree = document.getElementById("tree-"+f.id);
    const panel = document.getElementById("panel-"+f.id);
    tab.setAttribute("aria-selected", on);
    tab.tabIndex = on?0:-1;
    tree.setAttribute("aria-selected", on);
    tree.tabIndex = on?0:-1;
    tree.classList.toggle("active", on);
    panel.classList.toggle("active", on);
  });
  // status bar
  document.getElementById("statusLang").textContent = meta.lang;
  document.getElementById("langDot").style.background = langDotColors[meta.type] || "#f1e05a";
  const nLines = document.querySelectorAll("#panel-"+id+" .gutter span").length;
  document.getElementById("statusLn").textContent = "Ln 1, Col 1  ("+nLines+" lines)";
  // breadcrumb
  document.getElementById("breadcrumb").innerHTML =
    meta.crumb.map((c,i)=>`<span>${esc(c)}</span>${i<meta.crumb.length-1?'<span class="sep">›</span>':''}`).join("");
  document.getElementById("mobileFile").textContent = meta.file;
  // scroll editor to top on switch
  document.getElementById("editorScroll").scrollTop = 0;
  if(focusTab){ const t=document.getElementById("tab-"+id); if(t) t.focus(); }
  // close mobile explorer
  document.getElementById("explorer").classList.remove("open");
  document.getElementById("mobileMenu").setAttribute("aria-expanded","false");
  current = id;
}
let current = "about";

/* keyboard arrow nav across tabs */
function tabKeyNav(e, group){
  const ids = FILES.map(f=>f.id);
  const i = ids.indexOf(current);
  let ni = null;
  if(e.key==="ArrowRight"||e.key==="ArrowDown") ni=(i+1)%ids.length;
  else if(e.key==="ArrowLeft"||e.key==="ArrowUp") ni=(i-1+ids.length)%ids.length;
  else if(e.key==="Home") ni=0;
  else if(e.key==="End") ni=ids.length-1;
  if(ni!==null){
    e.preventDefault();
    activate(ids[ni], false);
    const el = document.getElementById((group==="tree"?"tree-":"tab-")+ids[ni]);
    if(el) el.focus();
  }
}

/* ═══════════ COUNTERS ═══════════ */
function animateCounters(){
  const nums = document.querySelectorAll("#panel-about .stat-num");
  nums.forEach(n=>{
    const raw = n.dataset.count;
    const target = parseFloat(raw);
    const suffix = raw.replace(/[\d.]/g,"");
    if(REDUCED || isNaN(target)){ n.textContent = raw; return; }
    const decimals = Number.isInteger(target)?0:1;
    const start = performance.now();
    const tick = now=>{
      const t = Math.min((now-start)/900,1);
      const eased = 1-Math.pow(1-t,3);
      n.textContent = (target*eased).toFixed(decimals) + (t===1?suffix:"");
      if(t<1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}
let counted = false;
function maybeCount(){
  if(counted || current!=="about") return;
  counted = true; animateCounters();
}

/* ═══════════ TOAST + COPY ═══════════ */
let toastTimer;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"),2500);
}
function wireCopy(){
  const btn = document.getElementById("copyEmailBtn");
  if(!btn) return;
  btn.addEventListener("click", ()=>{
    const ok = ()=>showToast("Email скопирован: "+DATA.email);
    const fb = ()=>showToast("Email: "+DATA.email);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(DATA.email).then(ok).catch(fb);
    } else fb();
  });
}

/* ═══════════ INIT ═══════════ */
renderTree();
renderTabs();
renderPanels();
wireCopy();

document.getElementById("tabbar").addEventListener("click", e=>{
  const tab = e.target.closest(".tab"); if(tab) activate(tab.dataset.id, false);
});
document.getElementById("fileTree").addEventListener("click", e=>{
  const f = e.target.closest(".tree-file"); if(f) activate(f.dataset.id, false);
});
document.getElementById("tabbar").addEventListener("keydown", e=>{
  if(e.target.closest(".tab")) tabKeyNav(e,"tab");
});
document.getElementById("fileTree").addEventListener("keydown", e=>{
  if(e.target.closest(".tree-file")) tabKeyNav(e,"tree");
});

/* mobile explorer toggle */
const mob = document.getElementById("mobileMenu");
mob.addEventListener("click", ()=>{
  const ex = document.getElementById("explorer");
  const open = ex.classList.toggle("open");
  mob.setAttribute("aria-expanded", open?"true":"false");
});

/* activity bar explorer button */
document.getElementById("actExplorer").addEventListener("click", ()=>{
  const ex = document.getElementById("explorer");
  // on desktop explorer is always visible; this toggles mobile / focus first file
  if(window.matchMedia("(max-width:768px)").matches){
    ex.classList.toggle("open");
  } else {
    const first = document.querySelector(".tree-file"); if(first) first.focus();
  }
});

activate("about", false);
maybeCount();
</script>
